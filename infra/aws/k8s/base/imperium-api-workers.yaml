apiVersion: apps/v1
kind: Deployment
metadata:
  name: imperium-api
  namespace: drovi
spec:
  replicas: 2
  selector:
    matchLabels:
      app: imperium-api
  template:
    metadata:
      labels:
        app: imperium-api
    spec:
      serviceAccountName: imperium-sa
      containers:
        - name: api
          image: REPLACE_ECR_IMPERIUM_BACKEND:latest
          imagePullPolicy: IfNotPresent
          command: ["imperium-api"]
          ports:
            - containerPort: 8010
              name: http
          envFrom:
            - configMapRef:
                name: drovi-config
            - secretRef:
                name: drovi-secrets
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 20
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "2Gi"
---
apiVersion: v1
kind: Service
metadata:
  name: imperium-api
  namespace: drovi
spec:
  selector:
    app: imperium-api
  ports:
    - name: http
      port: 8010
      targetPort: http
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: imperium-market-worker
  namespace: drovi
spec:
  replicas: 1
  selector:
    matchLabels:
      app: imperium-market-worker
  template:
    metadata:
      labels:
        app: imperium-market-worker
    spec:
      serviceAccountName: imperium-sa
      containers:
        - name: worker
          image: REPLACE_ECR_IMPERIUM_BACKEND:latest
          imagePullPolicy: IfNotPresent
          command: ["imperium-worker"]
          envFrom:
            - configMapRef:
                name: drovi-config
            - secretRef:
                name: drovi-secrets
          env:
            - name: IMPERIUM_WORKER_ROLE
              value: "market"
            - name: IMPERIUM_WORKER_CADENCE_SECONDS
              value: "5"
---
