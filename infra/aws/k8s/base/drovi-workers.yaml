apiVersion: apps/v1
kind: Deployment
metadata:
  name: drovi-worker
  namespace: drovi
spec:
  replicas: 2
  selector:
    matchLabels:
      app: drovi-worker
  template:
    metadata:
      labels:
        app: drovi-worker
    spec:
      serviceAccountName: drovi-intelligence-sa
      containers:
        - name: worker
          image: REPLACE_ECR_DROVI_INTELLIGENCE:latest
          imagePullPolicy: IfNotPresent
          command: ["python", "-m", "src.streaming.worker"]
          envFrom:
            - configMapRef:
                name: drovi-config
            - secretRef:
                name: drovi-secrets
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: drovi-secrets
                  key: DROVI_DATABASE_URL
            - name: PROMETHEUS_METRICS_PORT
              value: "9101"
          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
            limits:
              cpu: "2000m"
              memory: "4Gi"
---
