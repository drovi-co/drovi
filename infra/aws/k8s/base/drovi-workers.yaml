apiVersion: apps/v1
kind: Deployment
metadata:
  name: drovi-ingestion-worker
  namespace: drovi
spec:
  replicas: 2
  selector:
    matchLabels:
      app: drovi-ingestion-worker
  template:
    metadata:
      labels:
        app: drovi-ingestion-worker
    spec:
      serviceAccountName: drovi-intelligence-sa
      containers:
        - name: ingestion-worker
          image: REPLACE_ECR_DROVI_INGESTION_WORKER:latest
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: drovi-config
            - secretRef:
                name: drovi-secrets
          env:
            - name: KAFKA_CONSUMER_GROUP_ID
              value: "drovi-ingestion-worker"
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "2Gi"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: drovi-temporal-worker
  namespace: drovi
spec:
  replicas: 2
  selector:
    matchLabels:
      app: drovi-temporal-worker
  template:
    metadata:
      labels:
        app: drovi-temporal-worker
    spec:
      serviceAccountName: drovi-intelligence-sa
      containers:
        - name: temporal-worker
          image: REPLACE_ECR_DROVI_INTELLIGENCE:latest
          imagePullPolicy: IfNotPresent
          command: ["python", "-m", "src.contexts.workflows.infrastructure.worker"]
          envFrom:
            - configMapRef:
                name: drovi-config
            - secretRef:
                name: drovi-secrets
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: drovi-secrets
                  key: DROVI_DATABASE_URL
            - name: PROMETHEUS_METRICS_PORT
              value: "9104"
          livenessProbe:
            exec:
              command: ["python", "-m", "src.contexts.workflows.infrastructure.healthcheck"]
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 20
            failureThreshold: 6
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "2Gi"
