apiVersion: v1
kind: ServiceAccount
metadata:
  name: world-brain-autoscaler-sa
  namespace: drovi
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: world-brain-autoscaler-role
  namespace: drovi
rules:
  - apiGroups: ["autoscaling"]
    resources: ["horizontalpodautoscalers"]
    verbs: ["get", "list", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: world-brain-autoscaler-binding
  namespace: drovi
subjects:
  - kind: ServiceAccount
    name: world-brain-autoscaler-sa
    namespace: drovi
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: world-brain-autoscaler-role
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: world-brain-autoscaler
  namespace: drovi
spec:
  schedule: "*/2 * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      template:
        spec:
          serviceAccountName: world-brain-autoscaler-sa
          restartPolicy: OnFailure
          containers:
            - name: world-brain-autoscaler
              image: REPLACE_ECR_DROVI_INTELLIGENCE:latest
              imagePullPolicy: IfNotPresent
              command: ["python", "scripts/world_brain_autoscale.py", "--apply"]
              envFrom:
                - configMapRef:
                    name: drovi-config
                - secretRef:
                    name: drovi-secrets
              env:
                - name: DATABASE_URL
                  valueFrom:
                    secretKeyRef:
                      name: drovi-secrets
                      key: DROVI_DATABASE_URL
              resources:
                requests:
                  cpu: "100m"
                  memory: "256Mi"
                limits:
                  cpu: "500m"
                  memory: "1Gi"
