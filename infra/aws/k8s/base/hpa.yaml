apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: drovi-intelligence-api
  namespace: drovi
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: drovi-intelligence-api
  minReplicas: 2
  maxReplicas: 12
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: drovi-worker
  namespace: drovi
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: drovi-worker
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: imperium-api
  namespace: drovi
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: imperium-api
  minReplicas: 2
  maxReplicas: 8
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
