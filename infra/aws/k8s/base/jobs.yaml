apiVersion: batch/v1
kind: Job
metadata:
  name: drovi-db-migrate
  namespace: drovi
spec:
  backoffLimit: 3
  ttlSecondsAfterFinished: 3600
  template:
    spec:
      serviceAccountName: drovi-intelligence-sa
      restartPolicy: Never
      containers:
        - name: migrate
          image: REPLACE_ECR_DROVI_INTELLIGENCE:latest
          imagePullPolicy: IfNotPresent
          command: ["/bin/sh", "-ec", "alembic upgrade head"]
          envFrom:
            - configMapRef:
                name: drovi-config
            - secretRef:
                name: drovi-secrets
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: drovi-secrets
                  key: DROVI_DATABASE_URL
---
apiVersion: batch/v1
kind: Job
metadata:
  name: drovi-kafka-topic-bootstrap
  namespace: drovi
spec:
  backoffLimit: 6
  ttlSecondsAfterFinished: 3600
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: kafka-topics
          image: confluentinc/cp-kafka:7.6.0
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: drovi-config
            - secretRef:
                name: drovi-secrets
          command:
            - /bin/bash
            - -ec
            - |
              replication_factor="${KAFKA_TOPIC_REPLICATION_FACTOR:-3}"
              partitions="${KAFKA_TOPIC_PARTITIONS:-3}"
              security_protocol="${KAFKA_SECURITY_PROTOCOL:-SASL_SSL}"
              sasl_mechanism="${KAFKA_SASL_MECHANISM:-SCRAM-SHA-512}"
              raw_topic="${KAFKA_TOPIC_RAW_EVENTS:-raw.connector.events}"
              normalized_topic="${KAFKA_TOPIC_NORMALIZED_RECORDS:-normalized.records}"
              pipeline_topic="${KAFKA_TOPIC_PIPELINE_INPUT:-intelligence.pipeline.input}"
              intelligence_topic="${KAFKA_TOPIC_INTELLIGENCE:-drovi-intelligence}"
              graph_topic="${KAFKA_TOPIC_GRAPH_CHANGES:-graph.changes}"
              agent_inbox_topic="${KAFKA_TOPIC_AGENT_INBOX_EVENTS:-agent.inbox.events}"
              retry_suffix="${KAFKA_RETRY_SUFFIX:-.retry}"
              dlq_suffix="${KAFKA_DLQ_SUFFIX:-.dlq}"

              command_config_args=()
              if [[ "${security_protocol}" != "PLAINTEXT" ]]; then
                printf '%s\n' \
                  "security.protocol=${security_protocol}" \
                  "sasl.mechanism=${sasl_mechanism}" \
                  "sasl.jaas.config=org.apache.kafka.common.security.scram.ScramLoginModule required username=\"${KAFKA_SASL_USERNAME}\" password=\"${KAFKA_SASL_PASSWORD}\";" \
                  > /tmp/client.properties
                command_config_args=(--command-config /tmp/client.properties)
              fi

              topics=(
                "${raw_topic}"
                "${normalized_topic}"
                "${pipeline_topic}"
                "${intelligence_topic}"
                "${graph_topic}"
                "${agent_inbox_topic}"
                "${raw_topic}${retry_suffix}"
                "${normalized_topic}${retry_suffix}"
                "${pipeline_topic}${retry_suffix}"
                "${raw_topic}${dlq_suffix}"
                "${normalized_topic}${dlq_suffix}"
                "${pipeline_topic}${dlq_suffix}"
              )

              for topic in "${topics[@]}"; do
                kafka-topics --bootstrap-server "${KAFKA_BOOTSTRAP_SERVERS}" \
                  "${command_config_args[@]}" \
                  --create --if-not-exists \
                  --topic "${topic}" \
                  --partitions "${partitions}" \
                  --replication-factor "${replication_factor}"
              done
