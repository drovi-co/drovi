apiVersion: apps/v1
kind: Deployment
metadata:
  name: drovi-intelligence-api
  namespace: drovi
spec:
  replicas: 2
  selector:
    matchLabels:
      app: drovi-intelligence-api
  template:
    metadata:
      labels:
        app: drovi-intelligence-api
    spec:
      serviceAccountName: drovi-intelligence-sa
      containers:
        - name: api
          image: REPLACE_ECR_DROVI_INTELLIGENCE:latest
          imagePullPolicy: IfNotPresent
          command:
            - uvicorn
            - src.api.main:app
            - --host
            - 0.0.0.0
            - --port
            - "8000"
          ports:
            - containerPort: 8000
              name: http
          envFrom:
            - configMapRef:
                name: drovi-config
            - secretRef:
                name: drovi-secrets
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: drovi-secrets
                  key: DROVI_DATABASE_URL
            - name: PROMETHEUS_METRICS_PORT
              value: "9100"
          startupProbe:
            httpGet:
              path: /live
              port: http
            failureThreshold: 60
            periodSeconds: 5
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /live
              port: http
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
            limits:
              cpu: "2000m"
              memory: "4Gi"
---
apiVersion: v1
kind: Service
metadata:
  name: drovi-intelligence-api
  namespace: drovi
spec:
  selector:
    app: drovi-intelligence-api
  ports:
    - name: http
      port: 8000
      targetPort: http
