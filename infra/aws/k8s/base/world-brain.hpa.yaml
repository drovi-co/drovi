apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: drovi-world-normalize-worker
  namespace: drovi
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: drovi-world-normalize-worker
  minReplicas: 1
  maxReplicas: 8
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 75
---
