apiVersion: v1
kind: Service
metadata:
  name: falkordb
  namespace: drovi
spec:
  clusterIP: None
  selector:
    app: falkordb
  publishNotReadyAddresses: true
  ports:
    - name: redis
      port: 6379
      targetPort: 6379
---
apiVersion: v1
kind: Service
metadata:
  name: falkordb-client
  namespace: drovi
spec:
  selector:
    app: falkordb
  ports:
    - name: redis
      port: 6379
      targetPort: 6379
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: falkordb
  namespace: drovi
spec:
  serviceName: falkordb
  replicas: 1
  selector:
    matchLabels:
      app: falkordb
  template:
    metadata:
      labels:
        app: falkordb
    spec:
      serviceAccountName: stateful-sa
      containers:
        - name: falkordb
          image: falkordb/falkordb:latest
          imagePullPolicy: IfNotPresent
          command:
            - redis-server
            - --appendonly
            - "yes"
            - --port
            - "6379"
          ports:
            - containerPort: 6379
              name: redis
          volumeMounts:
            - name: falkordb-data
              mountPath: /data
          livenessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 20
            periodSeconds: 10
          readinessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 10
            periodSeconds: 5
          resources:
            requests:
              cpu: "500m"
              memory: "2Gi"
            limits:
              cpu: "2000m"
              memory: "8Gi"
  volumeClaimTemplates:
    - metadata:
        name: falkordb-data
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: gp3
        resources:
          requests:
            storage: 100Gi
