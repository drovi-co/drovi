apiVersion: v1
kind: ConfigMap
metadata:
  name: drovi-config
  namespace: drovi
data:
  ENVIRONMENT: "production"
  LOG_LEVEL: "INFO"
  LOG_FORMAT: "json"

  WEB_APP_URL: "https://app.drovi.co"
  API_BASE_URL: "https://api.drovi.co"
  CORS_ORIGINS: '["https://app.drovi.co","https://admin.drovi.co","https://imperium.drovi.co"]'

  FALKORDB_HOST: "falkordb-client"
  FALKORDB_PORT: "6379"
  FALKORDB_GRAPH_NAME: "drovi_intelligence"
  FALKORDB_APPLY_DEFAULT_FULLTEXT: "true"

  DEFAULT_MODEL_FAST: "moonshotai/Kimi-K2.5"
  DEFAULT_MODEL_BALANCED: "moonshotai/Kimi-K2.5"
  DEFAULT_MODEL_POWERFUL: "moonshotai/Kimi-K2.5"
  DEFAULT_LLM_MODEL: "gpt-4o"
  FALLBACK_LLM_MODEL: "claude-3-5-sonnet-20241022"
  EMBEDDING_MODEL: "togethercomputer/m2-bert-80M-32k-retrieval"
  PREFER_OPEN_SOURCE: "true"
  PROVIDER_FALLBACK_ENABLED: "true"
  FINETUNING_PROVIDER: "together"
  COLLECT_TRAINING_DATA: "true"
  TRAINING_DATA_SAMPLE_RATE: "0.1"
  TRAINING_DATA_PATH: "training_data"
  TS_BACKEND_URL: "http://localhost:3000"
  GOOGLE_CLIENT_ID: ""
  SLACK_CLIENT_ID: ""
  NOTION_CLIENT_ID: ""

  KAFKA_ENABLED: "true"
  KAFKA_SECURITY_PROTOCOL: "SASL_SSL"
  KAFKA_SASL_MECHANISM: "SCRAM-SHA-512"
  KAFKA_CONSUMER_GROUP_ID: "drovi-intelligence"
  KAFKA_AUTO_OFFSET_RESET: "earliest"
  KAFKA_ENABLE_AUTO_COMMIT: "false"
  KAFKA_BATCH_SIZE: "100"
  KAFKA_LINGER_MS: "10"
  KAFKA_WORKER_CONCURRENCY: "4"
  KAFKA_QUEUE_MAXSIZE: "1000"
  KAFKA_LAG_REPORT_INTERVAL_SECONDS: "30"
  KAFKA_TOPIC_RAW_EVENTS: "raw.connector.events"
  KAFKA_TOPIC_NORMALIZED_RECORDS: "normalized.records"
  KAFKA_TOPIC_PIPELINE_INPUT: "intelligence.pipeline.input"
  KAFKA_TOPIC_INTELLIGENCE: "drovi-intelligence"
  KAFKA_TOPIC_GRAPH_CHANGES: "graph.changes"
  KAFKA_TOPIC_AGENT_INBOX_EVENTS: "agent.inbox.events"
  KAFKA_TOPIC_PRIORITIES: '{"raw.connector.events":0,"normalized.records":1,"intelligence.pipeline.input":2,"drovi-intelligence":3,"graph.changes":4,"agent.inbox.events":1}'
  KAFKA_RAW_EVENT_MODE: "full"
  KAFKA_RETRY_SUFFIX: ".retry"
  KAFKA_DLQ_SUFFIX: ".dlq"
  KAFKA_MAX_RETRY_ATTEMPTS: "3"
  KAFKA_TOPIC_PARTITIONS: "3"
  KAFKA_TOPIC_REPLICATION_FACTOR: "3"
  KAFKA_SCHEMA_REGISTRY_ENFORCED: "true"

  KAFKA_RUN_PROCESSOR_IN_API: "false"
  STREAMING_QUEUE_SIZE: "256"
  STREAMING_WORKER_CONCURRENCY: "2"
  STREAMING_MAX_CHUNK_BYTES: "5000000"
  STREAMING_MAX_LATENCY_MS: "5000"
  SCHEDULER_RUN_IN_API: "true"
  SCHEDULER_ADVISORY_LOCK_ID: "4242001"
  WORLD_INGEST_KILL_SWITCH_ENABLED: "false"
  WORLD_INGEST_NONCRITICAL_PRIORITY_THRESHOLD: "3"
  WORLD_INGEST_GLOBAL_THROTTLE_MULTIPLIER: "1.0"
  WORLD_INGEST_SOURCE_THROTTLE_MAP: '{"worldnewsapi":1.4}'
  WORLD_TWIN_HOT_CACHE_ENABLED: "true"
  WORLD_TWIN_HOT_CACHE_TTL_SECONDS: "120"
  WORLD_TWIN_PREMATERIALIZE_ROLES: '["exec","legal","finance","product"]'
  WORLD_TWIN_PREMATERIALIZE_LOOKBACKS: "[24,168]"
  WORLD_CAPACITY_EVENT_RATE_BUDGET_EPS: "10000"
  WORLD_CAPACITY_STORAGE_BUDGET_BYTES: "5000000000000"
  WORLD_CAPACITY_GRAPH_NODE_BUDGET: "5000000000"
  WORLD_AUTOSCALER_ENABLED: "true"
  WORLD_AUTOSCALER_NAMESPACE: "drovi"
  WORLD_AUTOSCALER_COOLDOWN_SECONDS: "300"
  WORLD_AUTOSCALER_MAX_STEP: "2"
  WORLD_AUTOSCALER_FRESHNESS_LOOKBACK_HOURS: "6"
  WORLD_AUTOSCALER_SCALE_DOWN_QUEUE_THRESHOLD: "5"
  WORLD_AUTOSCALER_SCALE_DOWN_FRESHNESS_THRESHOLD_MINUTES: "20"
  WORLD_AUTOSCALER_FAIL_ON_ERRORS: "true"
  WORLD_AUTOSCALER_POOL_HPA_MAP: '{"normalize":"drovi-world-normalize-worker","graph":"drovi-world-graph-worker","ml":"drovi-world-ml-worker","simulation":"drovi-world-simulation-worker","critical":"drovi-world-critical-worker"}'
  JOB_WORKER_ALLOWED_JOB_TYPES: "[]"
  CANDIDATE_PROCESSING_ENABLED: "true"
  CANDIDATE_PROCESSING_INTERVAL_SECONDS: "60"
  WEEKLY_REPORTS_ENABLED: "true"
  WEEKLY_REPORTS_CRON: "0 9 * * MON"
  WEEKLY_REPORTS_PILOT_ONLY: "true"
  WEEKLY_BRIEF_DAYS: "7"
  WEEKLY_BLINDSPOT_DAYS: "30"
  DAILY_REPORTS_ENABLED: "true"
  DAILY_REPORTS_CRON: "0 9 * * *"
  DAILY_REPORTS_PILOT_ONLY: "true"
  DAILY_BRIEF_DAYS: "1"
  REPORTS_EMAIL_ENABLED: "true"
  REPORTS_EMAIL_SUBJECT_PREFIX: "[Drovi]"
  REPORTS_EMAIL_FALLBACK_TO_MEMBERS: "true"
  RESEND_FROM: "Drovi <reports@drovi.co>"
  RESEND_REPLY_TO: "jeremy@drovi.co"

  EVIDENCE_STORAGE_BACKEND: "s3"
  EVIDENCE_S3_PREFIX: "drovi-evidence"
  DOCUMENTS_S3_PREFIX: "drovi-documents"
  EVIDENCE_S3_PRESIGN_EXPIRY_SECONDS: "3600"
  EVIDENCE_REQUIRE_KMS: "true"
  S3_FORCE_PATH_STYLE: "false"

  TEMPORAL_ENABLED: "true"
  TEMPORAL_NAMESPACE: "default"
  TEMPORAL_TASK_QUEUE: "drovi-workflows"

  NATS_URL: "nats://nats:4222"
  IMPERIUM_HOST: "0.0.0.0"
  IMPERIUM_PORT: "8010"
  IMPERIUM_REDIS_NAMESPACE: "imperium"
  IMPERIUM_SHUTDOWN_GRACE_SECONDS: "20"
  IMPERIUM_DATA_MODE: "synthetic"
  IMPERIUM_MARKETS_PROVIDER: "polygon"
  IMPERIUM_MARKETS_FALLBACKS: "finnhub,twelvedata"
  IMPERIUM_CRYPTO_PROVIDER: "coinbase"
  IMPERIUM_CRYPTO_FALLBACKS: "coingecko"
  IMPERIUM_NEWS_PROVIDER: "benzinga"
  IMPERIUM_NEWS_FALLBACKS: "newsapi,sec-rss"
  IMPERIUM_BANKING_PROVIDER: "plaid"
  IMPERIUM_BANKING_FALLBACKS: "truelayer"
  IMPERIUM_BROKERAGE_PROVIDER: "snaptrade"
  IMPERIUM_BROKERAGE_FALLBACKS: "alpaca"
  IMPERIUM_BUSINESS_PROVIDER: "stripe"
  IMPERIUM_BUSINESS_FALLBACKS: "quickbooks,polar"
  IMPERIUM_PROVIDER_MAX_RETRIES: "2"
  IMPERIUM_PROVIDER_BACKOFF_MS: "300"
  IMPERIUM_SEC_USER_AGENT: "imperium-connectors/0.1 (ops@imperium.local)"
