          image: REPLACE_ECR_DROVI_INTELLIGENCE:latest
          imagePullPolicy: IfNotPresent
          command: ["python", "-m", "src.jobs.worker"]
          envFrom:
            - configMapRef:
                name: drovi-config
            - secretRef:
