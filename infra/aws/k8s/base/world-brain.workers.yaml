apiVersion: scheduling.k8s.io/v1
kind: PriorityClass
metadata:
  name: world-brain-critical-priority
value: 100000
globalDefault: false
description: "Priority class for world-brain critical risk/compliance workloads."
---
apiVersion: scheduling.k8s.io/v1
kind: PriorityClass
metadata:
  name: world-brain-standard-priority
value: 10000
globalDefault: false
description: "Priority class for world-brain standard workloads."
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: drovi-world-normalize-worker
  namespace: drovi
spec:
  replicas: 1
  selector:
    matchLabels:
      app: drovi-world-normalize-worker
      world-brain-pool: normalize
  template:
    metadata:
      labels:
        app: drovi-world-normalize-worker
        world-brain-pool: normalize
    spec:
      priorityClassName: world-brain-standard-priority
      serviceAccountName: drovi-intelligence-sa
      containers:
        - name: normalize-worker
          image: REPLACE_ECR_DROVI_INTELLIGENCE:latest
          imagePullPolicy: IfNotPresent
          command: ["python", "-m", "src.streaming.worker"]
          envFrom:
            - configMapRef:
                name: drovi-config
            - secretRef:
                name: drovi-secrets
          env:
            - name: KAFKA_CONSUMER_GROUP_ID
              value: "drovi-world-normalize-worker"
            - name: KAFKA_TOPIC_PRIORITIES
              value: '{"raw.connector.events":0,"normalized.records":0,"intelligence.pipeline.input":2,"drovi-intelligence":3,"graph.changes":4}'
            - name: PROMETHEUS_METRICS_PORT
              value: "9111"
          resources:
            requests:
              cpu: "300m"
              memory: "768Mi"
            limits:
              cpu: "1500m"
              memory: "2Gi"
---
