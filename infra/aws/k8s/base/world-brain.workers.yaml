apiVersion: batch/v1
kind: CronJob
metadata:
  name: world-brain-maintenance-fast
  namespace: drovi
spec:
  schedule: "*/5 * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      template:
        spec:
          serviceAccountName: drovi-intelligence-sa
          restartPolicy: OnFailure
          containers:
            - name: enqueue-maintenance-fast
              image: REPLACE_ECR_DROVI_INTELLIGENCE:latest
              imagePullPolicy: IfNotPresent
              command: ["python", "scripts/enqueue_world_brain_maintenance.py", "--profile", "fast"]
              envFrom:
                - configMapRef:
                    name: drovi-config
                - secretRef:
                    name: drovi-secrets
              env:
                - name: DATABASE_URL
                  valueFrom:
                    secretKeyRef:
                      name: drovi-secrets
                      key: DROVI_DATABASE_URL
---
