apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: falkordb
  namespace: drovi
spec:
  template:
    spec:
      containers:
        - name: falkordb
          resources:
            requests:
              cpu: "10m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "4Gi"
