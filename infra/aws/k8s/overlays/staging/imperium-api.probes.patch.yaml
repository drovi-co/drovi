apiVersion: apps/v1
kind: Deployment
metadata:
  name: imperium-api
  namespace: drovi
spec:
  template:
    spec:
      containers:
        - name: api
          startupProbe:
            httpGet:
              path: /health
              port: http
            failureThreshold: 36
            periodSeconds: 5
            timeoutSeconds: 2
          livenessProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 6
