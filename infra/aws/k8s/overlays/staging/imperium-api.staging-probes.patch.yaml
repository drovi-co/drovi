apiVersion: apps/v1
kind: Deployment
metadata:
  name: imperium-api
  namespace: drovi
spec:
  template:
    spec:
      containers:
        - name: api
          readinessProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 6
