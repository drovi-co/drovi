apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: drovi-public
  namespace: drovi
spec:
  rules:
    - host: api.drovi.co
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: drovi-intelligence-api
                port:
                  number: 8000
    - host: app.drovi.co
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: web
                port:
                  number: 80
    - host: admin.drovi.co
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: admin
                port:
                  number: 80
    - host: imperium-api.drovi.co
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: imperium-api
                port:
                  number: 8010
    - host: imperium.drovi.co
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: imperium-web
                port:
                  number: 80
