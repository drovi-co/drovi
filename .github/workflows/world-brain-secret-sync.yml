name: world-brain-secret-sync

on:
  workflow_dispatch:
  schedule:
    - cron: "0 7 * * *"

jobs:
  sync:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        environment_name: [staging, production]
    environment: ${{ matrix.environment_name }}
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Update kubeconfig
        env:
          AWS_REGION: ${{ vars.AWS_REGION }}
          EKS_CLUSTER_NAME: ${{ vars.EKS_CLUSTER_NAME }}
        run: aws eks update-kubeconfig --region "$AWS_REGION" --name "$EKS_CLUSTER_NAME"

      - name: Sync rotated provider secrets into cluster runtime
        env:
          AWS_REGION: ${{ vars.AWS_REGION }}
          K8S_NAMESPACE: drovi
          K8S_SECRET_NAME: drovi-secrets
          WORLD_BRAIN_SECRET_PREFIX: drovi-${{ matrix.environment_name }}/world-brain
          WORLD_BRAIN_PROVIDER_SECRET_NAMES: worldnewsapi_api_key
        run: bash infra/aws/scripts/sync_world_brain_provider_secrets.sh
