name: Cloudflare ACM Validation (Prod)

on:
  push:
    branches:
      - aws-staging-deploy-fixes
    paths:
      - '.github/workflows/cloudflare-acm-prod-validation.yml'
  workflow_dispatch:

jobs:
  upsert-acm-cname:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Upsert ACM DNS validation CNAME in Cloudflare
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          ZONE_NAME: drovi.co
          RECORD_NAME: _190debed58e61f0d57ef502f7be7c56a.drovi.co
          RECORD_CONTENT: _c5da1d516c60834bb8709090f467ff92.jkddzztszm.acm-validations.aws
        run: |
          set -euo pipefail

          if [[ -z "${CLOUDFLARE_API_TOKEN:-}" ]]; then
            echo "CLOUDFLARE_API_TOKEN is missing"
            exit 1
          fi

          api_base="https://api.cloudflare.com/client/v4"
          auth_header="Authorization: Bearer ${CLOUDFLARE_API_TOKEN}"

          zone_resp="$(curl -sS -X GET "${api_base}/zones?name=${ZONE_NAME}" \
            -H "${auth_header}" \
            -H "Content-Type: application/json")"
          zone_id="$(echo "${zone_resp}" | jq -r '.result[0].id // empty')"
          if [[ -z "${zone_id}" ]]; then
            echo "Failed to resolve Cloudflare zone id for ${ZONE_NAME}"
            echo "${zone_resp}" | jq .
            exit 1
          fi

          record_resp="$(curl -sS -X GET "${api_base}/zones/${zone_id}/dns_records?type=CNAME&name=${RECORD_NAME}" \
            -H "${auth_header}" \
            -H "Content-Type: application/json")"
          record_id="$(echo "${record_resp}" | jq -r '.result[0].id // empty')"

          payload="$(jq -nc \
            --arg type "CNAME" \
            --arg name "${RECORD_NAME}" \
            --arg content "${RECORD_CONTENT}" \
            '{type:$type,name:$name,content:$content,ttl:1,proxied:false}')"

          if [[ -n "${record_id}" ]]; then
            update_resp="$(curl -sS -X PUT "${api_base}/zones/${zone_id}/dns_records/${record_id}" \
              -H "${auth_header}" \
              -H "Content-Type: application/json" \
              --data "${payload}")"
            echo "${update_resp}" | jq -e '.success == true' >/dev/null
            echo "Updated existing ACM validation CNAME."
          else
            create_resp="$(curl -sS -X POST "${api_base}/zones/${zone_id}/dns_records" \
              -H "${auth_header}" \
              -H "Content-Type: application/json" \
              --data "${payload}")"
            echo "${create_resp}" | jq -e '.success == true' >/dev/null
            echo "Created ACM validation CNAME."
          fi
