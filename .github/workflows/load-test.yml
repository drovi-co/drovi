name: load-test

on:
  workflow_dispatch:

jobs:
  load-test:
    runs-on: self-hosted
    env:
      LOAD_API_BASE_URL: ${{ secrets.LOAD_API_BASE_URL }}
      LOAD_API_KEY: ${{ secrets.LOAD_API_KEY }}
      LOAD_ORG_ID: ${{ secrets.LOAD_ORG_ID }}
      LOAD_CONCURRENCY: "5"
      LOAD_REQUESTS: "50"
      LOAD_MAX_P95_SECONDS: "30"
      LOAD_MAX_UEM_P95_SECONDS: "0.5"
    steps:
      - uses: actions/checkout@v4
      - name: Run API load test harness
        run: python3 drovi-intelligence/scripts/load_test.py
      - name: Run top read APIs + ask stream budgets (k6)
        run: |
          docker run --rm \
            -e BASE_URL="$LOAD_API_BASE_URL" \
            -e API_KEY="$LOAD_API_KEY" \
            -e ORG_ID="$LOAD_ORG_ID" \
            -e VUS="$LOAD_CONCURRENCY" \
            -e DURATION=2m \
            -v "$PWD/drovi-intelligence/tests/load:/scripts" \
            grafana/k6:latest run /scripts/read_api_and_ask_stream.js
