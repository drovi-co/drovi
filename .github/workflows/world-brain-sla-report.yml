name: world-brain-sla-report

on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * 1"

jobs:
  sla-report:
    runs-on: self-hosted
    env:
      WORLD_BRAIN_REPORT_DATABASE_URL: ${{ secrets.WORLD_BRAIN_REPORT_DATABASE_URL }}
      WORLD_BRAIN_REPORT_LOOKBACK_HOURS: "168"
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install drovi-intelligence
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e drovi-intelligence

      - name: Generate SLA report
        if: env.WORLD_BRAIN_REPORT_DATABASE_URL != ''
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p artifacts
          python drovi-intelligence/scripts/world_brain_sla_report.py \
            --database-url "$WORLD_BRAIN_REPORT_DATABASE_URL" \
            --lookback-hours "$WORLD_BRAIN_REPORT_LOOKBACK_HOURS" \
            > artifacts/world-brain-sla-report.json

      - name: Skip if DB URL secret is missing
        if: env.WORLD_BRAIN_REPORT_DATABASE_URL == ''
        run: echo "WORLD_BRAIN_REPORT_DATABASE_URL is not configured; skipping report generation."

      - name: Upload SLA report artifact
        if: env.WORLD_BRAIN_REPORT_DATABASE_URL != ''
        uses: actions/upload-artifact@v4
        with:
          name: world-brain-sla-report
          path: artifacts/world-brain-sla-report.json
