name: Deploy AWS Staging

on:
  push:
    branches:
      - staging
    paths:
      - 'infra/aws/**'
      - 'docker-compose.yml'
      - 'drovi-intelligence/**'
      - 'services/imperium-backend/**'
      - 'apps/web/**'
      - 'apps/admin/**'
      - 'apps/imperium/**'
      - '.github/workflows/deploy-aws-staging.yml'
      - '.github/workflows/deploy-aws-shared.yml'
  workflow_dispatch:

jobs:
  deploy:
    uses: ./.github/workflows/deploy-aws-shared.yml
    with:
      environment_name: staging
      k8s_overlay: staging
    secrets: inherit
